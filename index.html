          75% {

    <!-- Anti-Inspect, Anti-Right-Click, Anti-Copy Script -->
    <script>
        // Disable Right Click & Show "nonow.."
        document.addEventListener('contextmenu', event => {
            event.preventDefault();
            
            const el = document.createElement('div');
            el.textContent = 'nonow..';
            el.className = 'nonow-text';
            
            // Random rotation between -25 and +25 degrees
            const rot = Math.random() * 50 - 25;
            el.style.setProperty('--rot', `${rot}deg`);
            
            el.style.left = `${event.clientX}px`;
            el.style.top = `${event.clientY}px`;
            
            document.body.appendChild(el);
            
            // Remove after 1 second
            setTimeout(() => el.remove(), 1000);
        });

        // Disable Keyboard Shortcuts for Inspect Element, Console, View Source
        document.addEventListener('keydown', function(e) {
            // Disable F12
            if (e.key === 'F12' || e.keyCode === 123) {
                e.preventDefault();
            }
            // Disable Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+Shift+C (Windows/Linux)
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) {
                e.preventDefault();
            }
            // Disable Ctrl+U (Windows/Linux View Source)
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
            }
            // Disable Cmd+Option+I, Cmd+Option+J, Cmd+Option+U (Mac)
            if (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'U' || e.key === 'u')) {
                e.preventDefault();
            }
        });
    </script>

      // -------------------------------------------------------------------------

      // Hook kustom untuk memicu animasi hanya saat elemen terlihat di layar (scroll)
      const useScrollTrigger = (options = {}) => {
        const ref = useRef(null);
        const [triggered, setTriggered] = useState(false);

        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) {
              setTriggered(true);
              observer.disconnect(); // Hanya memicu animasi 1x
            }
          }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px", ...options });
          
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [options]);
        
        return [ref, triggered];
      };

      // Komponen Reveal Otomatis untuk Transisi Halus
      const Reveal = ({ children, delay = 0, direction = 'up', className = "" }) => {
        const [ref, triggered] = useScrollTrigger();

        let transformClass = "translate-y-12"; // up
        if (direction === 'down') transformClass = "-translate-y-12";
        if (direction === 'left') transformClass = "translate-x-12";
        if (direction === 'right') transformClass = "-translate-x-12";
        if (direction === 'none') transformClass = "scale-95"; 

        return (
          <div
            ref={ref}
            className={`transition-all duration-[1200ms] ease-[cubic-bezier(0.25,0.8,0.25,1)] ${className} ${
              triggered ? "opacity-100 translate-y-0 translate-x-0 scale-100" : `opacity-0 ${transformClass}`
            }`}
            style={{ transitionDelay: `${delay}ms` }}
          >
            {children}
          </div>
        );
      };

      // Komponen untuk Efek Hover Magnetik (Sticky Elastic)
      const MagneticButton = ({ children, onMouseEnter, onMouseLeave, className }) => {
        const ref = useRef(null);
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [isHovered, setIsHovered] = useState(false);

        const handleMouseMove = (e) => {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const x = (e.clientX - rect.left - rect.width / 2) * 0.3; // Kekuatan tarikan magnet
          const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
          setPosition({ x, y });
        };

        const handleMouseLeave = (e) => {
          setIsHovered(false);
          setPosition({ x: 0, y: 0 });
          if (onMouseLeave) onMouseLeave(e);
        };

        const handleMouseEnter = (e) => {
          setIsHovered(true);
          if (onMouseEnter) onMouseEnter(e);
        };

        return (
          <div
            ref={ref}
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
            onMouseEnter={handleMouseEnter}
            className={className}
            style={{
              transform: `translate3d(${position.x}px, ${position.y}px, 0) scale(${isHovered ? 1.1 : 1})`,
              transition: isHovered ? 'transform 0.1s ease-out, box-shadow 0.3s ease' : 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease',
              willChange: 'transform'
            }}
          >
            {children}
          </div>
        );
      };

      // Komponen helper untuk menangani gambar yang belum ada agar tidak merusak layout
      const DynamicImage = ({ src, alt, className, isActive = true, objectFit = 'object-contain', minimalFallback = false }) => {

        const [isLoaded, setIsLoaded] = useState(false);

        useEffect(() => {

          setIsLoaded(false);

        if (hasError || !src) {

          }

              <code className="text-[10px] text-blue-500 bg-white px-1 rounded break-all max-w-[80%] truncate">{src || 'No src'}</code>
            </div>
          );
        }

        return (
          <img 
            src={src} 
            alt={alt}
            onLoad={() => setIsLoaded(true)}
            onError={() => setHasError(true)}
            className={`${className} ${objectFit} transition-opacity ease-in-out ${isLoaded && isActive ? 'opacity-100 duration-300' : 'opacity-0 duration-1000 delay-150'}`}
          />
        );
      };

        const [wordsRef, wordsTriggered] = useScrollTrigger({ threshold: 0.8 });
        const [rocketRef, rocketTriggered] = useScrollTrigger({ threshold: 0.5 });

        // State & Ref untuk Directional Expand Bento Grid
        const bentoSectionRef = useRef(null);

        const [activeServiceContent, setActiveServiceContent] = useState(null);
        const [isClosing, setIsClosing] = useState(false);
