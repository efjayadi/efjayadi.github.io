        document.addEventListener('contextmenu', event => {
            event.preventDefault();
            const el = document.createElement('div');
            el.textContent = 'nonow..';
            el.className = 'nonow-text';
            const rot = Math.random() * 50 - 25;
            el.style.setProperty('--rot', `${rot}deg`);
            el.style.left = `${event.clientX}px`;
            el.style.top = `${event.clientY}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) e.preventDefault();
            if (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'U' || e.key === 'u')) e.preventDefault();

      const useScrollTrigger = (options = {}) => {
        const ref = useRef(null);
        const [triggered, setTriggered] = useState(false);
        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { setTriggered(true); observer.disconnect(); }
          }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px", ...options });
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [options]);
        return [ref, triggered];
      };

      const Reveal = ({ children, delay = 0, direction = 'up', className = "" }) => {
        const [ref, triggered] = useScrollTrigger();
        let transformClass = "translate-y-12"; 
        if (direction === 'down') transformClass = "-translate-y-12";
        if (direction === 'left') transformClass = "translate-x-12";
        if (direction === 'right') transformClass = "-translate-x-12";
        if (direction === 'none') transformClass = "scale-95"; 
        return (
          <div ref={ref} className={`transition-all duration-[1200ms] ease-[cubic-bezier(0.25,0.8,0.25,1)] ${className} ${triggered ? "opacity-100 translate-y-0 translate-x-0 scale-100" : `opacity-0 ${transformClass}`}`} style={{ transitionDelay: `${delay}ms` }}>{children}</div>
        );
      };

      const MagneticButton = ({ children, onMouseEnter, onMouseLeave, className }) => {
        const ref = useRef(null);
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [isHovered, setIsHovered] = useState(false);
        const handleMouseMove = (e) => {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
          const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
          setPosition({ x, y });
        };
        const handleMouseLeave = (e) => { setIsHovered(false); setPosition({ x: 0, y: 0 }); if (onMouseLeave) onMouseLeave(e); };
        const handleMouseEnter = (e) => { setIsHovered(true); if (onMouseEnter) onMouseEnter(e); };
        return (
          <div ref={ref} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} onMouseEnter={handleMouseEnter} className={className} style={{ transform: `translate3d(${position.x}px, ${position.y}px, 0) scale(${isHovered ? 1.1 : 1})`, transition: isHovered ? 'transform 0.1s ease-out, box-shadow 0.3s ease' : 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease', willChange: 'transform' }}>{children}</div>
        );
      };

      const DynamicImage = ({ src, alt, className, isActive = true, objectFit = 'object-cover', minimalFallback = false }) => {
        const [hasError, setHasError] = useState(false);
        const [isLoaded, setIsLoaded] = useState(false);
        const imgRef = useRef(null);

        useEffect(() => {
          setHasError(false); setIsLoaded(false);
          if (imgRef.current && imgRef.current.complete) { setIsLoaded(true); }
        }, [src]);

        const handleLoad = () => setIsLoaded(true);

        if (hasError || !src) {

                                <div className="relative">
                                    <div className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"><Phone size={20}/></div>
                                    <input type="tel" name="whatsapp" value={mulaiProyekForm.whatsapp} onChange={handleMulaiProyekChange} placeholder="081234567890" className="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-sm bg-white" />
                                </div>
                            </div>
                        </div>
                        <div className="flex justify-end mt-10">
                            <button onClick={nextMulaiProyekStep} disabled={!mulaiProyekForm.nama} className="px-8 py-4 bg-black text-white font-bold rounded-full hover:bg-gray-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">Lanjut ke Layanan <ArrowRight size={18}/></button>
                        </div>
                    </div>
                </div>

                {/* Step 2: Layanan */}
                <div className={`transition-all duration-500 ease-in-out ${mulaiProyekStep === 2 ? 'opacity-100 transform-none block' : 'opacity-0 translate-x-10 hidden'}`}>
                    <div className="bg-[#F5F5F7] rounded-[2rem] p-8 md:p-12 border border-gray-200/50 shadow-sm">
                        <h2 className="text-2xl font-bold mb-2">Kebutuhan Proyek</h2>
                        <p className="text-slate-500 mb-8">Pilih satu atau beberapa layanan yang Anda butuhkan.</p>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {[
                                { id: 'Desain Branding', icon: PenTool, color: 'text-blue-500', bg: 'bg-blue-100' },
                                { id: 'Website / Landing Page', icon: Monitor, color: 'text-purple-500', bg: 'bg-purple-100' },
                                { id: 'Gambar 3D / Konstruksi', icon: HardHat, color: 'text-orange-500', bg: 'bg-orange-100' },
                                { id: 'Social Media Management', icon: Smartphone, color: 'text-pink-500', bg: 'bg-pink-100' },
                                { id: 'Company Profile / Buku', icon: Layout, color: 'text-green-500', bg: 'bg-green-100' },
                                { id: 'Lainnya', icon: Box, color: 'text-slate-500', bg: 'bg-slate-200' }
                            ].map((layanan) => {
                                const isSelected = mulaiProyekForm.layanan.includes(layanan.id);
                                return (
                                    <div 
                                        key={layanan.id} 
                                        onClick={() => toggleLayananProyek(layanan.id)}
                                        className={`cursor-pointer border-2 rounded-2xl p-6 flex items-center gap-4 transition-all duration-300 ${isSelected ? 'border-black bg-white shadow-lg' : 'border-transparent bg-white hover:border-gray-300 shadow-sm'}`}
                                    >
                                        <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 ${layanan.bg} ${layanan.color}`}>
                                            <layanan.icon size={20} />
                                        </div>
                                        <span className={`font-bold ${isSelected ? 'text-black' : 'text-slate-700'}`}>{layanan.id}</span>
                                        {isSelected && <CheckCircle2 className="ml-auto text-black" size={20}/>}
                                    </div>
                                )
                            })}
                        </div>

                        <div className="flex justify-between mt-10">
                            <button onClick={prevMulaiProyekStep} className="px-8 py-4 bg-white text-black border border-gray-200 font-bold rounded-full hover:bg-gray-50 transition-colors flex items-center gap-2"><ChevronLeft size={18}/> Kembali</button>
                            <button onClick={nextMulaiProyekStep} className="px-8 py-4 bg-black text-white font-bold rounded-full hover:bg-gray-800 transition-colors flex items-center gap-2">Lanjut Briefing <ArrowRight size={18}/></button>
                        </div>
                    </div>
                </div>

                {/* Step 3: Brief */}
                <div className={`transition-all duration-500 ease-in-out ${mulaiProyekStep === 3 ? 'opacity-100 transform-none block' : 'opacity-0 translate-x-10 hidden'}`}>
                    <div className="bg-[#F5F5F7] rounded-[2rem] p-8 md:p-12 border border-gray-200/50 shadow-sm">
                        <h2 className="text-2xl font-bold mb-2">Brief Singkat</h2>
                        <p className="text-slate-500 mb-8">Bantu saya memahami bisnis Anda agar hasil visual selaras dengan visi Anda.</p>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Ceritakan tentang bisnis/produk Anda</label>
                                <textarea name="deskripsi" value={mulaiProyekForm.deskripsi} onChange={handleMulaiProyekChange} placeholder="Bisnis ini bergerak di bidang F&B dengan fokus ke makanan sehat..." rows="4" className="w-full px-4 py-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-sm bg-white resize-none"></textarea>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Siapa target pasar utama Anda?</label>
                                <textarea name="targetPasar" value={mulaiProyekForm.targetPasar} onChange={handleMulaiProyekChange} placeholder="Gen Z, usia 18-25 tahun, menyukai gaya hidup modern..." rows="2" className="w-full px-4 py-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-sm bg-white resize-none"></textarea>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-2">Referensi Gaya Visual (Link URL atau deskripsi)</label>
                                <input type="text" name="referensi" value={mulaiProyekForm.referensi} onChange={handleMulaiProyekChange} placeholder="Suka gaya minimalis elegan seperti brand Apple atau link Pinterest..." className="w-full px-4 py-4 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent transition-all shadow-sm bg-white" />
                            </div>
                        </div>

                        <div className="flex justify-between mt-10">
                            <button onClick={prevMulaiProyekStep} className="px-8 py-4 bg-white text-black border border-gray-200 font-bold rounded-full hover:bg-gray-50 transition-colors flex items-center gap-2"><ChevronLeft size={18}/> Kembali</button>
                            <button onClick={nextMulaiProyekStep} className="px-8 py-4 bg-black text-white font-bold rounded-full hover:bg-gray-800 transition-colors flex items-center gap-2">Lanjut Budget <ArrowRight size={18}/></button>
                        </div>
                    </div>
                </div>

                {/* Step 4: Budget & Timeline */}
                <div className={`transition-all duration-500 ease-in-out ${mulaiProyekStep === 4 ? 'opacity-100 transform-none block' : 'opacity-0 translate-x-10 hidden'}`}>
                    <div className="bg-[#F5F5F7] rounded-[2rem] p-8 md:p-12 border border-gray-200/50 shadow-sm">
                        <h2 className="text-2xl font-bold mb-2">Timeline & Budget</h2>
                        <p className="text-slate-500 mb-8">Mari selaraskan ekspektasi waktu dan investasi proyek.</p>
                        
                        <div className="space-y-10">
                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-4">Estimasi Budget Tersedia</label>
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                    {['< Rp 2 Juta', 'Rp 2 - 5 Juta', 'Rp 5 - 10 Juta', '> Rp 10 Juta'].map(bud => (
                                        <div 
                                            key={bud} 
                                            onClick={() => setMulaiProyekForm(prev => ({ ...prev, budget: bud }))}
                                            className={`cursor-pointer border-2 rounded-xl p-4 text-center transition-all ${mulaiProyekForm.budget === bud ? 'border-black bg-black text-white font-bold shadow-md' : 'border-gray-200 bg-white text-slate-600 font-medium hover:border-gray-300'}`}
                                        >
                                            {bud}
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-slate-700 mb-4">Target Timeline</label>
                                <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                                    {['Santai (> 14 Hari)', 'Normal (7 - 14 Hari)', 'Urgent (< 7 Hari)'].map(time => (
                                        <div 
                                            key={time} 
                                            onClick={() => setMulaiProyekForm(prev => ({ ...prev, timeline: time }))}
                                            className={`cursor-pointer border-2 rounded-xl p-4 text-center transition-all ${mulaiProyekForm.timeline === time ? 'border-black bg-black text-white font-bold shadow-md' : 'border-gray-200 bg-white text-slate-600 font-medium hover:border-gray-300'}`}
                                        >
                                            {time}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="flex justify-between mt-12">
                            <button onClick={prevMulaiProyekStep} className="px-8 py-4 bg-white text-black border border-gray-200 font-bold rounded-full hover:bg-gray-50 transition-colors flex items-center gap-2"><ChevronLeft size={18}/> Kembali</button>
                            <button onClick={nextMulaiProyekStep} className="px-8 py-4 bg-black text-white font-bold rounded-full hover:bg-gray-800 transition-colors flex items-center gap-2">Review Form <ArrowRight size={18}/></button>
                        </div>
                    </div>
                </div>

                {/* Step 5: Review & Submit */}
                <div className={`transition-all duration-500 ease-in-out ${mulaiProyekStep === 5 ? 'opacity-100 transform-none block' : 'opacity-0 translate-x-10 hidden'}`}>
                    <div className="bg-slate-900 text-white rounded-[2rem] p-8 md:p-12 shadow-2xl relative overflow-hidden">
                        <div className="absolute -top-20 -right-20 w-64 h-64 bg-green-500 rounded-full mix-blend-screen filter blur-[80px] opacity-20 pointer-events-none"></div>
                        
                        <div className="flex flex-col items-center text-center mb-10 relative z-10">
                            <div className="w-20 h-20 bg-green-500/20 text-green-400 rounded-full flex items-center justify-center mb-6">
                                <Send size={32} />
                            </div>
                            <h2 className="text-3xl font-black mb-4">Siap Mengirim Brief?</h2>
                            <p className="text-slate-400 max-w-lg">Semua informasi Anda telah direkap. Klik tombol di bawah untuk mengirim form ini langsung ke WhatsApp saya agar kita bisa segera berdiskusi.</p>
                        </div>

                        <div className="bg-slate-800/50 rounded-2xl p-6 border border-slate-700 mb-10 relative z-10">
                            <h4 className="text-lg font-bold mb-4 text-white border-b border-slate-700 pb-2">Summary</h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                <div><span className="text-slate-500 block">Nama / Brand</span><strong className="text-slate-200">{mulaiProyekForm.nama || '-'} / {mulaiProyekForm.brand || '-'}</strong></div>
                                <div><span className="text-slate-500 block">Layanan</span><strong className="text-slate-200">{mulaiProyekForm.layanan.length > 0 ? mulaiProyekForm.layanan.join(', ') : '-'}</strong></div>
                                <div><span className="text-slate-500 block">Budget</span><strong className="text-slate-200">{mulaiProyekForm.budget || '-'}</strong></div>
                                <div><span className="text-slate-500 block">Timeline</span><strong className="text-slate-200">{mulaiProyekForm.timeline || '-'}</strong></div>
                            </div>
                        </div>

                        <div className="flex flex-col sm:flex-row justify-center gap-4 relative z-10">
                            <button onClick={prevMulaiProyekStep} className="px-8 py-4 bg-transparent border border-slate-600 text-slate-300 font-bold rounded-full hover:bg-slate-800 transition-colors flex items-center justify-center gap-2"><ChevronLeft size={18}/> Edit Kembali</button>
                            <button onClick={sendMulaiProyekWa} className="px-8 py-4 bg-green-500 text-white font-black rounded-full hover:bg-green-400 transition-all shadow-[0_0_20px_rgba(34,197,94,0.4)] flex items-center justify-center gap-2">Kirim via WhatsApp <Send size={18}/></button>
                        </div>
                    </div>
                </div>
            </div>

            {/* --- SHARED FOOTER --- */}
            <footer className="bg-slate-900 text-white pt-20 pb-10 px-6">
              <Reveal direction="up" className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between gap-16 mb-16"><div className="max-w-sm"><h3 className="text-2xl font-bold mb-6 text-white">Mari berkolaborasi and diskusikan potensi Anda.</h3><button className="w-full flex items-center justify-center gap-2 bg-[#128C7E] hover:bg-[#25D366] text-white py-4 px-6 rounded-full text-sm font-bold transition-colors shadow-lg shadow-green-900/30">Hubungi via WhatsApp</button><p className="text-xs text-slate-400 mt-4 opacity-80">Respon cepat untuk setiap ide brilian Anda.</p></div><div className="flex gap-16"><div><h4 className="font-bold mb-4 text-white">Solusi</h4><ul className="space-y-3 text-sm text-slate-400"><li><a href="#" className="hover:text-green-400 transition-colors">Desain Branding</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Website Professional</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Gambar 3D</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Konsultasi Digital</a></li></ul></div><div><h4 className="font-bold mb-4 text-white">Profil</h4><ul className="space-y-3 text-sm text-slate-400"><li><a href="#" onClick={(e) => { e.preventDefault(); setCurrentPage('home'); }} className="hover:text-green-400 transition-colors">Tentang Fajar</a></li><li><a href="#" onClick={(e) => { e.preventDefault(); setCurrentPage('portfolio'); }} className="hover:text-green-400 transition-colors">Portofolio</a></li><li><a href="#" onClick={(e) => { e.preventDefault(); setCurrentPage('estimasi'); }} className="hover:text-green-400 transition-colors">Estimasi Biaya</a></li><li><a href="#" onClick={(e) => { e.preventDefault(); setCurrentPage('why-fajar'); }} className="hover:text-green-400 transition-colors">Kenapa ke Fajar?</a></li></ul></div></div></Reveal>
              <Reveal delay={200} direction="up" className="max-w-6xl mx-auto border-t border-white/10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-slate-400 font-medium"><p>© 2026 Fajar Jayadi. Dedicated to Value-Driven Excellence.</p><div className="flex gap-4"><a href="#" className="hover:text-white transition-colors">Instagram</a><a href="#" className="hover:text-white transition-colors">LinkedIn</a><a href="#" className="hover:text-white transition-colors">Behance</a></div></Reveal>
            </footer>
          </div>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
