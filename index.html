    <script>
        document.addEventListener('contextmenu', event => {
            event.preventDefault();
            const el = document.createElement('div');
            el.textContent = 'nonow..';
            el.className = 'nonow-text';
            const rot = Math.random() * 50 - 25;
            el.style.setProperty('--rot', `${rot}deg`);
            el.style.left = `${event.clientX}px`;
            el.style.top = `${event.clientY}px`;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'C' || e.key === 'c')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) e.preventDefault();
            if (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j' || e.key === 'U' || e.key === 'u')) e.preventDefault();
        });

      const Smartphone = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="5" y="2" width="14" height="20" rx="2" ry="2"></rect><line x1="12" y1="18" x2="12.01" y2="18"></line></svg>;
      const Box = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
      const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
      const CheckCircle2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>;
      const Star = ({ size = 24, fill = "none", className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>;
      const ChevronRight = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 18 15 12 9 6"></polyline></svg>;
      const ChevronLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;

      const useScrollTrigger = (options = {}) => {
        const ref = useRef(null);
        const [triggered, setTriggered] = useState(false);
        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) { setTriggered(true); observer.disconnect(); }
          }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px", ...options });
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [options]);
        return [ref, triggered];
      };

      const Reveal = ({ children, delay = 0, direction = 'up', className = "" }) => {
        const [ref, triggered] = useScrollTrigger();
        let transformClass = "translate-y-12"; 
        if (direction === 'down') transformClass = "-translate-y-12";
        if (direction === 'left') transformClass = "translate-x-12";
        if (direction === 'right') transformClass = "-translate-x-12";
        if (direction === 'none') transformClass = "scale-95"; 
        return (
          <div ref={ref} className={`transition-all duration-[1200ms] ease-[cubic-bezier(0.25,0.8,0.25,1)] ${className} ${triggered ? "opacity-100 translate-y-0 translate-x-0 scale-100" : `opacity-0 ${transformClass}`}`} style={{ transitionDelay: `${delay}ms` }}>{children}</div>
        );
      };

      const MagneticButton = ({ children, onMouseEnter, onMouseLeave, className }) => {
        const ref = useRef(null);
        const [position, setPosition] = useState({ x: 0, y: 0 });
        const [isHovered, setIsHovered] = useState(false);
        const handleMouseMove = (e) => {
          if (!ref.current) return;
          const rect = ref.current.getBoundingClientRect();
          const x = (e.clientX - rect.left - rect.width / 2) * 0.3;
          const y = (e.clientY - rect.top - rect.height / 2) * 0.3;
          setPosition({ x, y });
        };
        const handleMouseLeave = (e) => { setIsHovered(false); setPosition({ x: 0, y: 0 }); if (onMouseLeave) onMouseLeave(e); };
        const handleMouseEnter = (e) => { setIsHovered(true); if (onMouseEnter) onMouseEnter(e); };
        return (
          <div ref={ref} onMouseMove={handleMouseMove} onMouseLeave={handleMouseLeave} onMouseEnter={handleMouseEnter} className={className} style={{ transform: `translate3d(${position.x}px, ${position.y}px, 0) scale(${isHovered ? 1.1 : 1})`, transition: isHovered ? 'transform 0.1s ease-out, box-shadow 0.3s ease' : 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s ease', willChange: 'transform' }}>{children}</div>
        );
      };

      const DynamicImage = ({ src, alt, className, isActive = true, objectFit = 'object-contain', minimalFallback = false }) => {
        const [hasError, setHasError] = useState(false);
        const [isLoaded, setIsLoaded] = useState(false);
        const imgRef = useRef(null);

        useEffect(() => {
          setHasError(false); setIsLoaded(false);
          if (imgRef.current && imgRef.current.complete) { setIsLoaded(true); }
        }, [src]);

        const handleLoad = () => setIsLoaded(true);
        const handleError = () => setHasError(true);

        if (hasError || !src) {
          if (minimalFallback) { return <div className={`flex items-center justify-center font-black text-slate-300 bg-slate-50 tracking-tighter whitespace-nowrap ${className}`}>KARYA {alt.replace('Portfolio ', '')}</div>; }
          return (
            <div className={`flex flex-col items-center justify-center bg-gray-100 border border-gray-200 border-dashed text-gray-400 p-4 text-center ${className} transition-opacity ease-in-out ${isActive ? 'opacity-100 duration-300' : 'opacity-0 duration-1000 delay-150'}`}>
              <div className="w-10 h-10 bg-gray-200 rounded-full mb-2 animate-pulse"></div>
              <code className="text-[10px] text-blue-500 bg-white px-1 rounded break-all max-w-[80%] truncate">{src || 'No src'}</code>
            </div>
          );
        }

        return (
          <div className={`relative overflow-hidden ${className}`}>
             {!isLoaded && !minimalFallback && (
               <div className="absolute inset-0 bg-slate-50 animate-pulse flex items-center justify-center z-0">
                  <div className="w-6 h-6 bg-slate-100 rounded-full opacity-50"></div>
               </div>
             )}
             {/* Updated to strictly use w-full h-full so object-cover spans correctly within the over-sized container */}
             <img 
               ref={imgRef} 
               src={src} 
               alt={alt} 
               onLoad={handleLoad} 
               onError={handleError} 
               className={`w-full h-full ${objectFit} transition-opacity duration-300 ${isLoaded && isActive ? 'opacity-100' : 'opacity-0'} relative z-10`} 
             />
          </div>
        );
      };

      function App() {
        const [isLoaded, setIsLoaded] = useState(false);
        useEffect(() => setIsLoaded(true), []);
        const [isMenuOpen, setIsMenuOpen] = useState(false);
        const [activeCategory, setActiveCategory] = useState('default');
        const headerWrapperRef = useRef(null);
        const logoTargetRef = useRef(null);
        const [dotStyle, setDotStyle] = useState({ x: 0, y: 0, opacity: 0 });
        const updateDot = (element) => {
          if (!element || !headerWrapperRef.current) return;
          const targetRect = element.getBoundingClientRect();
          const headerRect = headerWrapperRef.current.getBoundingClientRect();
          setDotStyle({ x: targetRect.left - headerRect.left - 2, y: targetRect.top - headerRect.top + 5, opacity: 1 });
        };
        useEffect(() => {
          const initDot = () => { if (logoTargetRef.current) updateDot(logoTargetRef.current); };
          initDot();
          const t1 = setTimeout(initDot, 100); 
          const t2 = setTimeout(initDot, 500); 
          window.addEventListener('resize', initDot);
          return () => { clearTimeout(t1); clearTimeout(t2); window.removeEventListener('resize', initDot); };

        const [wordsRef, wordsTriggered] = useScrollTrigger({ threshold: 0.8 });

        const [activeServiceContent, setActiveServiceContent] = useState(null);
        const [isClosing, setIsClosing] = useState(false);
        const [isTransitioning, setIsTransitioning] = useState(false);
        const initialClipRef = useRef('inset(0px 0px 0px 0px round 2rem)');
        const [clipPathStyle, setClipPathStyle] = useState('inset(0px 0px 0px 0px round 2rem)');

        // Background Repel Effect Logic
        const avatarRef = useRef(null);
        const [bgOffset, setBgOffset] = useState({ x: 0, y: 0 });
        const [isAvatarHovered, setIsAvatarHovered] = useState(false);

        const handleAvatarMouseMove = (e) => {
          if (!avatarRef.current) return;
          const rect = avatarRef.current.getBoundingClientRect();
          // Negative multiplier causes the background to shift AWAY from the cursor
          const x = (e.clientX - rect.left - rect.width / 2) * -0.1;
          const y = (e.clientY - rect.top - rect.height / 2) * -0.1;
          setBgOffset({ x, y });
        };
        const handleAvatarMouseLeave = () => {
          setIsAvatarHovered(false);
          setBgOffset({ x: 0, y: 0 });
        };
        const handleAvatarMouseEnter = () => {
          setIsAvatarHovered(true);

        const portfolioData = {
          desain: [

          ],

          ]
        };

        // --- Background Preloading Logic ---
        useEffect(() => {
          if (!isLoaded) return;

          // Defer preloading until main page is fully interactive
          const preloadTimer = setTimeout(() => {
            const allImages = Object.values(portfolioData).flat();
            allImages.forEach(src => {

                    {/* Row 2 */}
                    <div onClick={(e) => openService(e, 'company_profile')} className="h-full bg-[#F5F5F7] rounded-[2rem] p-8 relative overflow-hidden group hover:bg-[#EFEFF1] transition-colors border border-gray-200/50 cursor-pointer"><div className={getTileContentClass('company_profile')}><h3 className="text-xl font-bold mb-1">Media Cetak & Buku</h3><p className="text-slate-500 text-sm">Profil perusahaan, book design, and media cetak elegan.</p><Smartphone className="absolute bottom-8 right-8 text-purple-500 w-16 h-16 opacity-30 group-hover:-rotate-12 transition-transform" /></div></div>
                    <div onClick={(e) => openService(e, 'aplikasi')} className="h-full bg-[#F5F5F7] rounded-[2rem] p-8 relative overflow-hidden group hover:bg-[#EFEFF1] transition-colors border border-gray-200/50 cursor-pointer"><div className={getTileContentClass('aplikasi')}><h3 className="text-xl font-bold mb-1">Ekosistem Digital</h3><p className="text-slate-500 text-sm">Custom social media feed and visual sistem untuk operasional bisnis.</p><div className="absolute bottom-10 left-1/2 -translate-x-1/2 w-20 h-40 bg-blue-100 rounded-[1.25rem] border-4 border-white shadow-lg flex flex-col p-2 gap-2 group-hover:-translate-y-4 transition-transform duration-500"><div className="w-full h-4 bg-blue-200 rounded-full"></div><div className="w-full flex-grow bg-blue-50 rounded-lg"></div></div></div></div>
                    <div onClick={(e) => openService(e, 'layout')} className="md:col-span-2 lg:col-span-2 h-full bg-[#F5F5F7] rounded-[2rem] p-8 relative overflow-hidden group hover:bg-[#EFEFF1] transition-colors border border-gray-200/50 flex flex-col justify-center cursor-pointer"><div className={`${getTileContentClass('layout')} flex flex-col justify-center`}><h3 className="text-xl font-bold mb-1">Banner & Gambar Teknik</h3><p className="text-slate-500 text-sm">Banner, X-Banner, and layout fungsional yang siap diimplementasikan.</p><div className="mt-6 flex gap-2 items-end h-16">{[40, 70, 45, 90, 60, 80, 50, 100].map((h, i) => (<div key={i} className="w-full bg-slate-300 rounded-t-sm transition-all duration-500 group-hover:bg-slate-400" style={{ height: `${h}%` }}></div>))}</div></div></div>
                  </div>
                </div>

                <div onClick={closeService} className={`col-start-1 col-end-1 row-start-1 row-end-1 z-40 ${activeServiceContent === 'website' ? 'bg-slate-900' : 'bg-[#F5F5F7]'} rounded-[2rem] w-full cursor-pointer overflow-hidden`} style={{ clipPath: expandedService ? clipPathStyle : initialClipRef.current, pointerEvents: expandedService && !isClosing ? 'auto' : 'none', visibility: activeServiceContent ? 'visible' : 'hidden', transition: isTransitioning ? 'clip-path 0.7s cubic-bezier(0.4, 0, 0.2, 1)' : 'none' }}>
                    {activeServiceContent && (
                        <div className="relative pb-16 pt-8 px-6 h-full overflow-y-auto hide-scrollbar">
                            <div onClick={(e) => e.stopPropagation()} className="max-w-5xl mx-auto cursor-default w-full">
                               <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                  {portfolioData[activeServiceContent]?.map((path, itemIdx) => (
                                     <div 
                                        key={itemIdx} 
                                        className={`aspect-square rounded-3xl overflow-hidden relative cursor-pointer group border ${activeServiceContent === 'website' ? 'bg-slate-800 border-slate-700' : 'bg-white border-gray-200/50'}`}
                                      >
                                        <div 
                                          className={`w-full h-full transition-all duration-300 ease-out hover:scale-[1.04] active:scale-[0.98] flex items-center justify-center ${expandedService && !isClosing ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'}`}
                                          style={{ transitionDelay: (expandedService && !isClosing && !isTransitioning) ? `${400 + (itemIdx * 80)}ms` : '0ms' }}
                                        >
                                          <DynamicImage src={path} alt={`Portfolio ${itemIdx}`} minimalFallback={true} className="w-full h-full object-cover" />
                                        </div>
                                     </div>
                                  ))}
                               </div>
                            </div>
                        </div>
                    )}
                </div>
              </div>
            </section>

            <section className="py-20 bg-white border-y border-gray-100 overflow-hidden">
              <Reveal direction="up" className="max-w-6xl mx-auto px-6 mb-12 text-center pointer-events-none"><h2 className="text-3xl md:text-4xl font-black mb-4 tracking-tight text-slate-900">Client Fajar</h2><p className="text-slate-500 font-medium">Berbagai entitas bisnis yang telah mempercayakan identitas visual mereka.</p></Reveal>
              <Reveal delay={200} direction="none" className="w-full relative">
                <div className="absolute top-0 left-0 w-16 md:w-32 h-full bg-gradient-to-r from-white to-transparent z-10 pointer-events-none"></div><div className="absolute top-0 right-0 w-16 md:w-32 h-full bg-gradient-to-l from-white to-transparent z-10 pointer-events-none"></div>
                <div ref={carouselRef} onMouseDown={handleMouseDown} onMouseLeave={handleMouseLeave} onMouseUp={handleMouseUp} onMouseMove={handleMouseMoveCarousel} className={`flex items-center gap-16 md:gap-24 px-10 overflow-x-auto py-4 select-none hide-scrollbar ${isDragging ? 'cursor-grabbing' : 'cursor-grab'}`}>{displayLogos.map((item, index) => (<div key={`client-${item}-${index}`} className="flex-shrink-0 transition-transform duration-500 hover:scale-110"><DynamicImage src={`client-logo-${item}.png`} alt={`Client Logo ${item}`} minimalFallback={true} className="h-8 md:h-12 text-2xl w-auto object-contain grayscale opacity-40 hover:grayscale-0 hover:opacity-100 transition-all duration-300 pointer-events-none" /></div>))}</div>
              </Reveal>
            </section>

            <section className="py-24 px-6 max-w-4xl mx-auto">
              <Reveal direction="up">
                <div className="w-full relative testi-container min-h-[350px] md:min-h-[300px]">
                  {testimonials.map((t, idx) => {
                    const state = getTestiState(idx);
                    return (<div key={idx} className={`testi-card bg-gray-50 rounded-[2.5rem] p-8 md:p-16 border border-gray-100 flex flex-col md:flex-row gap-6 md:gap-10 items-center shadow-sm ${getTestiClass(state)}`} style={getTestiStyle(state)}><div className="flex-1 text-center md:text-left"><div className="flex gap-1 text-orange-400 mb-6 justify-center md:justify-start"><Star fill="currentColor" size={20} /><Star fill="currentColor" size={20} /><Star fill="currentColor" size={20} /><Star fill="currentColor" size={20} /><Star fill="currentColor" size={20} /></div><h3 className="text-xl md:text-2xl font-bold leading-tight mb-8 text-slate-800">"{t.text}"</h3><div className="flex items-center gap-4 justify-center md:justify-start mt-auto"><div className="w-12 h-12 bg-slate-300 text-slate-700 rounded-full flex items-center justify-center font-black text-lg shrink-0">{t.name.charAt(0)}</div><div className="text-left"><p className="font-bold text-sm text-slate-900">{t.name}</p><p className="text-slate-500 text-xs">{t.role}</p></div></div></div><div className="hidden md:flex gap-3 shrink-0 z-20 self-end md:self-auto mb-2 md:mb-0">
                           <button onClick={nextTesti} className="w-12 h-12 rounded-full bg-white border border-gray-200 flex items-center justify-center hover:bg-gray-100 transition-colors shadow-sm pointer-events-auto"><ChevronLeft size={20}/></button>
                           <button onClick={prevTesti} className="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-gray-800 transition-colors shadow-sm pointer-events-auto"><ChevronRight size={20}/></button>
                        </div><div className="flex md:hidden gap-4 mt-4 z-20 w-full justify-center">
                           <button onClick={nextTesti} className="w-12 h-12 rounded-full bg-white border border-gray-200 flex items-center justify-center hover:bg-gray-100 transition-colors shadow-sm pointer-events-auto"><ChevronLeft size={20}/></button>
                           <button onClick={prevTesti} className="w-12 h-12 rounded-full bg-black text-white flex items-center justify-center hover:bg-gray-800 transition-colors shadow-sm pointer-events-auto"><ChevronRight size={20}/></button>
                        </div></div>);
                  })}
                </div>
              </Reveal>
            </section>

            <section className="py-24 px-6 max-w-6xl mx-auto border-b border-gray-100">
              <div className="flex flex-col md:flex-row gap-16 items-center">
                <Reveal direction="right" className="flex-1"><h2 className="text-5xl md:text-6xl font-black tracking-tight leading-[1.1] mb-6">Wujudkan Visi.<br/>Mulai Hari Ini.</h2><p className="text-slate-500 font-medium mb-10 max-w-md">Serahkan tantangan visual and teknis Anda kepada partner yang tepat. Dapatkan hasil maksimal untuk perkembangan bisnis Anda.</p><div className="flex gap-4"><button className="px-8 py-4 bg-green-400 text-white font-bold rounded-full hover:bg-green-500 transition-colors">Konsultasi Sekarang</button><button className="px-8 py-4 bg-gray-100 text-black font-bold rounded-full hover:bg-gray-200 transition-colors">Detail Estimasi</button></div></Reveal>
                <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 gap-6 w-full">{[{ icon: PenTool, text: 'Identitas Visual', color: 'text-blue-500', bg: 'bg-blue-100' },{ icon: Monitor, text: 'Web Professional', color: 'text-purple-500', bg: 'bg-purple-100' },{ icon: Box, text: 'Gambar 3D Realis', color: 'text-orange-500', bg: 'bg-orange-100' },{ icon: Zap, text: 'Eksekusi Tangkas', color: 'text-yellow-500', bg: 'bg-yellow-100' },{ icon: Layout, text: 'User Experience', color: 'text-pink-500', bg: 'bg-pink-100' },{ icon: CheckCircle2, text: 'Komitmen Kualitas', color: 'text-green-500', bg: 'bg-green-100' }].map((feat, i) => (<Reveal key={i} delay={i * 100} direction="left"><div className="flex items-center gap-4 p-2"><div className={`w-10 h-10 rounded-full flex items-center justify-center ${feat.bg} ${feat.color}`}><feat.icon size={18} /></div><span className="font-bold text-slate-800">{feat.text}</span></div></Reveal>))}</div>
              </div>
            </section>

            <footer className="bg-slate-900 text-white pt-20 pb-10 px-6">
              <Reveal direction="up" className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between gap-16 mb-16"><div className="max-w-sm"><h3 className="text-2xl font-bold mb-6 text-white">Mari berkolaborasi and diskusikan potensi Anda.</h3><button className="w-full flex items-center justify-center gap-2 bg-[#128C7E] hover:bg-[#25D366] text-white py-4 px-6 rounded-full text-sm font-bold transition-colors shadow-lg shadow-green-900/30">Hubungi via WhatsApp</button><p className="text-xs text-slate-400 mt-4 opacity-80">Respon cepat untuk setiap ide brilian Anda.</p></div><div className="flex gap-16"><div><h4 className="font-bold mb-4 text-white">Solusi</h4><ul className="space-y-3 text-sm text-slate-400"><li><a href="#" className="hover:text-green-400 transition-colors">Desain Branding</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Website Professional</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Gambar 3D</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Konsultasi Digital</a></li></ul></div><div><h4 className="font-bold mb-4 text-white">Profil</h4><ul className="space-y-3 text-sm text-slate-400"><li><a href="#" className="hover:text-green-400 transition-colors">Tentang Fajar</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Portofolio</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Estimasi Biaya</a></li><li><a href="#" className="hover:text-green-400 transition-colors">Hubungi</a></li></ul></div></div></Reveal>
              <Reveal delay={200} direction="up" className="max-w-6xl mx-auto border-t border-white/10 pt-8 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-slate-400 font-medium"><p>© 2026 Fajar Jayadi. Dedicated to Value-Driven Excellence.</p><div className="flex gap-4"><a href="#" className="hover:text-white transition-colors">Instagram</a><a href="#" className="hover:text-white transition-colors">LinkedIn</a><a href="#" className="hover:text-white transition-colors">Behance</a></div></Reveal>
            </footer>
          </div>
        );
      }
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
