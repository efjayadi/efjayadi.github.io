      const Zap = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
      const CheckCircle2 = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><path d="M9 12l2 2 4-4"></path></svg>;

      const ChevronLeft = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="15 18 9 12 15 6"></polyline></svg>;

      const XIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
      // -------------------------------------------------------------------------

      // Hook kustom untuk memicu animasi hanya saat elemen terlihat di layar (scroll)
      const useScrollTrigger = (options = {}) => {
        const ref = useRef(null);
        const [triggered, setTriggered] = useState(false);

        useEffect(() => {
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) {
              setTriggered(true);
              observer.disconnect(); // Hanya memicu animasi 1x
            }
          }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px", ...options });
          
          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [options]);
        
        return [ref, triggered];
      };

      // Komponen Reveal Otomatis untuk Transisi Halus
      const Reveal = ({ children, delay = 0, direction = 'up', className = "" }) => {
        const [ref, triggered] = useScrollTrigger();

        let transformClass = "translate-y-12"; // up
        if (direction === 'down') transformClass = "-translate-y-12";
        if (direction === 'left') transformClass = "translate-x-12";
        if (direction === 'right') transformClass = "-translate-x-12";
        if (direction === 'none') transformClass = "scale-95"; 

        return (
          <div
            ref={ref}
            className={`transition-all duration-[1200ms] ease-[cubic-bezier(0.25,0.8,0.25,1)] ${className} ${
              triggered ? "opacity-100 translate-y-0 translate-x-0 scale-100" : `opacity-0 ${transformClass}`
            }`}
            style={{ transitionDelay: `${delay}ms` }}
          >
            {children}
          </div>
        );
      };

      // Komponen helper untuk menangani gambar yang belum ada agar tidak merusak layout
      const DynamicImage = ({ src, alt, className }) => {
        const [hasError, setHasError] = useState(false);
        const [isLoaded, setIsLoaded] = useState(false);

        useEffect(() => {
          setHasError(false);
          setIsLoaded(false);
        }, [src]);

        if (hasError || !src) {
          return (
            <div className={`flex flex-col items-center justify-center bg-gray-100 rounded-3xl border border-gray-200 border-dashed text-gray-400 p-4 text-center ${className}`}>
              <div className="w-16 h-16 bg-gray-200 rounded-full mb-2 animate-pulse"></div>
              <p className="font-semibold text-xs mb-1 text-gray-500">Gambar Placeholder</p>
              <code className="text-[10px] text-blue-500 bg-white px-1 rounded">{src || 'Tidak ada src'}</code>
            </div>
          );
        }

        return (
          <img 
            src={src} 
            alt={alt}
            onLoad={() => setIsLoaded(true)}
            onError={() => setHasError(true)}
            className={`${className} object-contain transition-all duration-500 ${isLoaded ? 'opacity-100 scale-100' : 'opacity-0 scale-95'}`}
          />
        );
      };

        // State dan Ref untuk Carousel Dragging (Pan)
        const carouselRef = useRef(null);
        const [isDragging, setIsDragging] = useState(false);
        const [startX, setStartX] = useState(0);
        const [scrollLeft, setScrollLeft] = useState(0);

        const handleMouseDown = (e) => {
          setIsDragging(true);
          setStartX(e.pageX - carouselRef.current.offsetLeft);
          setScrollLeft(carouselRef.current.scrollLeft);
        };
        const handleMouseLeave = () => setIsDragging(false);
        const handleMouseUp = () => setIsDragging(false);

          e.preventDefault();
